        "dplyr",
        "ggplot2",
        "knitr",
        "rmarkdown",
        "spelling",
        "testthat"
      ],
      "VignetteBuilder": "knitr",
      "Encoding": "UTF-8",
      "Language": "en-US",
      "LazyData": "true",
